name: EMBA Docker Image build

on:
  # push:
  #  branches:
  #    - '**'        # matches every branch
  # pull_request:
  #  branches:
  #    - '**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * */2' # do it every 2nd day

permissions:
  contents: read

jobs:
  docker-build:
    if: github.repository_owner == 'e-m-b-a'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be    # v1.3.1 - https://github.com/jlumbroso/free-disk-space/releases/tag/v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
      - name: EMBA container build
        run: |
            sudo docker image prune -f
            sudo docker container prune -f
            sudo apt-get update -y
            sudo apt-get install python3-venv -y
            sudo apt-get install docker-compose -y
            mkdir ./external
            python3 -m venv "./external/emba_venv"
            source "./external/emba_venv/bin/activate"
            echo "GH_action:true" > ./installer/gh_action
            sudo docker-compose build --no-cache --pull
            echo "GH_action:true" > ./config/gh_action
            NO_UPDATE_CHECK=1 sudo -E ./emba -d 2 -y
