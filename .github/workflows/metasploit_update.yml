name: Update Metasploit database

on:
  schedule:
    - cron: '0 0 * * 1' # do it every week

permissions:
  contents: read

jobs:
  update_msf_db:
    if: github.repository_owner == 'e-m-b-a'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
    - name: Install requirements
      run: |
        sudo apt-get update -y
        sudo apt-get install git
        mkdir external
        git clone https://github.com/rapid7/metasploit-framework.git external/metasploit-framework
    - name: update metasploit db
      run: |
        ./helpers/metasploit_db_update.sh /home/runner/work/emba/emba/external/metasploit-framework/modules
    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0 - https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: Update Metasploit database
        committer: GitHub <noreply@github.com>
        author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        signoff: false
        branch: metasploit_update
        delete-branch: true
        title: 'Metasploit database update'
        body: |
          Update report
          - Updated latest metasploit exploits
        labels: |
          db_update
          automated pr
        milestone: 0
        draft: false
