name: Bash Syntax and CPE Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash-syntax-and-cpe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2

      - name: Print Bash version
        run: bash --version

      - name: Validate Bash syntax
        run: |
          git ls-files '*.sh' 'emba' 'installer.sh' 'check_project.sh' \
            | xargs -r bash -n

      - name: Run CPE identifier regression test
        run: bash tests/test_cpe_identifiers.sh
