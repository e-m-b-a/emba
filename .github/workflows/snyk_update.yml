name: Update Snyk database

on:
  schedule:
    - cron: '0 0 * * 1' # do it every week
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update_snyk_db:
    if: github.repository_owner == 'e-m-b-a'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
    - name: Install requirements
      run: |
        sudo apt-get update -y
        sudo apt-get install lynx wget -y
    - name: update Snyk db
      run: |
        ./helpers/snyk_crawler.sh
    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0 - https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: Update Snyk database
        committer: GitHub <noreply@github.com>
        author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        signoff: false
        branch: snyk_update
        delete-branch: true
        title: 'Snyk database update'
        body: |
          Update report
          - Updated latest Snyk exploits
        labels: |
          db_update
          automated pr
        milestone: 0
        draft: false
