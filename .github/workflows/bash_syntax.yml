# This workflow tests the project for syntax issues

name: Check the project for bash syntax errors

on:
  push:
    branches:    
      - '**'        # matches every branch
  pull_request:
    branches:
      - '**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
permissions:
  contents: read

jobs:
  bash-n:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
    - name: Run bash -n
      run: |
        ./helpers/bash_syntax_checker.sh
