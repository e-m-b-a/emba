name: Update Linux Kernel version database

on:
  schedule:
    - cron: '0 0 * * 1' # do it every week
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  update_kernel_db:
    if: github.repository_owner == 'e-m-b-a'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Branch
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2 - https://github.com/actions/checkout/releases/tag/v6.0.2
    - name: Install requirements
      run: |
        sudo apt-get update -y
        sudo apt-get install curl -y
    - name: update Linux kernel version db
      run: |
        ./helpers/generate_kernel_info.sh || exit 1
    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0 - https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: Update Linux kernel version database
        committer: GitHub <noreply@github.com>
        author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
        signoff: false
        branch: kernelv_update
        delete-branch: true
        title: 'Linux kernel version database update'
        body: |
          Update report
          - Updated latest Linux kernel version details
        labels: |
          db_update
          automated pr
        milestone: 0
        draft: false
